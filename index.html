<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNOW-WEB Admin</title>

<style>
/* === MAIN SITE THEME SYSTEM === */
:root {
  --bg:#070707;
  --panel:rgba(18,18,18,.86);
  --text:#f6f6f6;
  --muted:#bdbdbd;
  --line:rgba(255,255,255,.12);
  --line-2:rgba(255,255,255,.2);
  --accent:#ffffff;
  --accent-text:#0a0a0a;
  --shadow:0 16px 48px rgba(0,0,0,.4);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* === TOPBAR (MATCHED) === */
.topbar{
  position:sticky;
  top:0;
  backdrop-filter:blur(12px);
  background:rgba(6,6,6,.75);
  border-bottom:1px solid var(--line);
  padding:14px 24px;
  display:flex;
  justify-content:space-between;
}

.brand-title{
  font-weight:900;
  letter-spacing:.22em;
  font-size:15px;
  text-transform:uppercase;
}
.brand-sub{
  color:var(--muted);
  font-size:10px;
  letter-spacing:.18em;
}

/* === WRAP === */
.wrap{
  max-width:1000px;
  margin:0 auto;
  padding:24px;
}

/* === CARDS (MATCH MAIN PANEL STYLE) === */
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.card-title{
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:8px;
}

/* === BUTTONS (MATCH MAIN SITE) === */
.pill{
  min-height:40px;
  padding:0 16px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:var(--text);
  cursor:pointer;
  font-weight:600;
  transition:.15s;
}
.pill:hover{
  border-color:var(--line-2);
  background:rgba(255,255,255,.07);
}

.pill.primary{
  background:var(--accent);
  color:var(--accent-text);
  border-color:var(--accent);
}

/* === INPUT === */
input{
  width:100%;
  height:44px;
  border-radius:12px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:var(--text);
  padding:0 12px;
  margin-bottom:10px;
}

/* === STATUS === */
.feedback{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
  color:var(--muted);
}

/* === METRICS === */
.metrics{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:20px;
}
.metric{
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  padding:14px;
  border-radius:16px;
}
.metric-val{
  font-size:26px;
  font-weight:900;
}
.metric-label{
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
}

/* === ROW === */
.row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

  <div id="devtoolsBlock" style="
position:fixed;
inset:0;
background:black;
color:white;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
font-family:sans-serif;
text-align:center;">
  <div>
    <h2>Close DevTools</h2>
    <p>You cannot use this panel with devtools open.</p>
  </div>
</div>

<div class="topbar">
  <div>
    <div class="brand-title">SNOW-WEB</div>
    <div class="brand-sub">Admin Panel</div>
  </div>
</div>

<div class="wrap">

  <!-- METRICS -->
  <div class="metrics">
    <div class="metric">
      <div class="metric-val" id="remaining">—</div>
      <div class="metric-label">Remaining</div>
    </div>
    <div class="metric">
      <div class="metric-val">1000</div>
      <div class="metric-label">Pool</div>
    </div>
    <div class="metric">
      <div class="metric-val" id="used">—</div>
      <div class="metric-label">Used</div>
    </div>
  </div>

  <!-- AUTH -->
  <div class="card">
    <div class="card-title">Authentication</div>
    <input id="pass" type="password" placeholder="Owner password">
    <div class="row">
      <button class="pill primary" onclick="check()">Check</button>
    </div>
    <div class="feedback" id="status">Idle</div>
  </div>

  <!-- KEYS -->
  <div class="card">
    <div class="card-title">Keys</div>
    <div class="row">
      <button class="pill" onclick="dump()">Load</button>
      <button class="pill" onclick="copy()">Copy</button>
    </div>
    <div class="feedback" id="keysStatus">No data</div>
  </div>

  <!-- RESEED -->
  <div class="card">
    <div class="card-title">Danger</div>
    <button class="pill" onclick="reseed()">Reseed</button>
    <div class="feedback" id="reseedStatus">Ready</div>
  </div>

</div>

<script>
const API = "https://snow-api.garypaytonpg.workers.dev/api/snow";

function getPass(){
  return document.getElementById("pass").value;
}

async function check(){
  document.getElementById("status").innerText = "Checking...";
  const res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({admin:true,pass:getPass(),action:"dump"})
  });
  const data = await res.json();

  if(!data.ok){
    document.getElementById("status").innerText = "Wrong password";
    return;
  }

  document.getElementById("status").innerText = "Connected";
  document.getElementById("remaining").innerText = data.remaining;
  document.getElementById("used").innerText = 1000 - data.remaining;
}

async function dump(){
  document.getElementById("keysStatus").innerText = "Loading...";
  const res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({admin:true,pass:getPass(),action:"dump"})
  });
  const data = await res.json();

  if(!data.ok){
    document.getElementById("keysStatus").innerText = "Error";
    return;
  }

  window.keys = data.keys;
  document.getElementById("keysStatus").innerText = data.keys.length + " keys loaded";
}

function copy(){
  if(!window.keys) return;
  navigator.clipboard.writeText(window.keys.join("\n"));
}

async function reseed(){
  document.getElementById("reseedStatus").innerText = "Working...";
  const res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({admin:true,pass:getPass(),action:"reseed"})
  });
  const data = await res.json();
  document.getElementById("reseedStatus").innerText = "Done";
}
</script>

<script>
const block = document.getElementById("devtoolsBlock");

setInterval(() => {
  if(!block) return;

  const open =
    window.outerWidth - window.innerWidth > 160 ||
    window.outerHeight - window.innerHeight > 160;

  block.style.display = open ? "flex" : "none";
}, 1000);
</script>

</body>

  
</html>
